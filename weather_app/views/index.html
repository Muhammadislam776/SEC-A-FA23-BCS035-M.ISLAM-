<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherPro Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body id="body">

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark glass-nav">

<div class="container">

<a class="navbar-brand fw-bold">

<i class="fa-solid fa-cloud-sun"></i>
WeatherPro

</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" onclick="forecastType(3)">
3 Days
</a>
</li>

<li class="nav-item">
<a class="nav-link" onclick="forecastType(5)">
5 Days
</a>
</li>

<li class="nav-item">
<a class="nav-link" onclick="hourlyForecast()">
24 Hours
</a>
</li>

<li class="nav-item">

<button class="btn btn-light ms-3" onclick="toggleMode()">

<i class="fa-solid fa-moon"></i>

</button>

</li>

</ul>

</div>

</div>

</nav>


<!-- HERO SECTION -->

<section class="hero text-center">

<h1 class="display-4 fw-bold">

Weather Forecast Dashboard

</h1>

<p>

Search any city to get live weather updates

</p>

</section>


<!-- SEARCH CARD -->

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card search-card p-4 shadow-lg">

<h5 class="text-center mb-3">

<i class="fa-solid fa-magnifying-glass"></i>
Search Weather

</h5>

<input id="cityInput" class="form-control search-input"
placeholder="Enter city name...">

<div id="suggestions"></div>

<button onclick="searchWeather()" class="btn btn-primary w-100 mt-3">

Check Weather

</button>

</div>

</div>

</div>

</div>


<!-- WEATHER RESULT -->

<div class="container mt-5">

<div id="weatherCard" class="row justify-content-center"></div>

<div id="forecast" class="row mt-4 justify-content-center"></div>

</div>


<!-- GRAPH -->

<div class="container mt-5">

<div class="card chart-card p-4 shadow">

<h5 class="text-center">

<i class="fa-solid fa-chart-line"></i>
Temperature Trend

</h5>

<canvas id="chart"></canvas>

</div>

</div>


<!-- FOOTER -->

<footer class="footer mt-5">

<div class="container text-center">

<p>

<i class="fa-solid fa-cloud"></i>
WeatherPro Dashboard © 2026

</p>

</div>

</footer>

<script src="/app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
